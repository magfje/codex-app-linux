name: release

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild/publish even if the GitHub release already exists
        required: false
        default: "false"
  schedule:
    # Pacific daylight target times: 1am, 9am, 12pm, 3pm, 5pm, 7pm, 10pm.
    - cron: "0 0,2,5,8,16,19,22 * * *"

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      prod_outdated: ${{ steps.state.outputs.prod_outdated }}
      beta_outdated: ${{ steps.state.outputs.beta_outdated }}
      prod_version: ${{ steps.state.outputs.prod_version }}
      beta_version: ${{ steps.state.outputs.beta_version }}
    env:
      NPM_PACKAGE_NAME: "codex-app-linux"
      CODEX_RELEASE_REPO: "${{ github.repository }}"
      GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Check release state
        id: state
        run: |
          node scripts/check-release-state.mjs \
            --package-name "${NPM_PACKAGE_NAME}" \
            --force "${{ github.event.inputs.force || 'false' }}" \
            --json-output "dist/release-state.json"

          echo "prod_outdated=$(jq -r '.channels.prod.outdated' dist/release-state.json)" >> "$GITHUB_OUTPUT"
          echo "beta_outdated=$(jq -r '.channels.beta.outdated' dist/release-state.json)" >> "$GITHUB_OUTPUT"
          echo "prod_version=$(jq -r '.channels.prod.packageVersion' dist/release-state.json)" >> "$GITHUB_OUTPUT"
          echo "beta_version=$(jq -r '.channels.beta.packageVersion' dist/release-state.json)" >> "$GITHUB_OUTPUT"

  canary:
    needs: preflight
    if: github.event.inputs.force == 'true' || needs.preflight.outputs.prod_outdated == 'true' || needs.preflight.outputs.beta_outdated == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      NPM_PACKAGE_NAME: "codex-app-linux"
      CODEX_RELEASE_REPO: "${{ github.repository }}"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y p7zip-full jq libarchive-tools xvfb x11-utils

      - name: Install repo deps
        run: npm ci

      - name: Install browser deps
        run: npx playwright install --with-deps chromium

      - name: Run upstream canary
        id: canary
        run: |
          mkdir -p dist
          set +e
          xvfb-run -a node scripts/canary.mjs \
            --json-output dist/upstream-canary.json \
            > dist/upstream-canary.log 2>&1
          status=$?
          cat dist/upstream-canary.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Upload canary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-canary-evidence
          path: |
            dist/upstream-canary.json
            dist/upstream-canary.log

      - name: Report scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/report-canary-failure.mjs \
            --summary dist/upstream-canary.json \
            --log dist/upstream-canary.log \
            --repo "${{ github.repository }}" \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --job-name "canary" \
            --step-name "Run upstream canary"

  publish-prod:
    needs: [preflight, canary]
    if: github.event.inputs.force == 'true' || needs.preflight.outputs.prod_outdated == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NPM_PACKAGE_NAME: "codex-app-linux"
      CODEX_RELEASE_REPO: "${{ github.repository }}"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y p7zip-full jq libarchive-tools xvfb x11-utils

      - name: Install repo deps
        run: npm ci

      - name: Install browser deps
        run: npx playwright install --with-deps chromium

      - name: Build channel
        run: |
          extra_args=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            extra_args="--force"
          fi
          node scripts/release-channel.mjs \
            --channel "prod" \
            --json-output "dist/prod-release.json" \
            $extra_args

      - name: Read build metadata
        id: meta
        run: |
          json="dist/prod-release.json"
          echo "skipped=$(jq -r '.skipped // false' "$json")" >> "$GITHUB_OUTPUT"
          echo "linux_dir=$(jq -r '.linuxDir // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "appimage=$(jq -r '.appImagePath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "tarball=$(jq -r '.unpackedTarballPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "icon=$(jq -r '.iconAssetPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "checksums=$(jq -r '.checksumsPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "pkgbuild=$(jq -r '.aurPackage.pkgbuildPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "srcinfo=$(jq -r '.aurPackage.srcinfoPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "install_script=$(jq -r '.aurPackage.installPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "aur_package_name=$(jq -r '.aurPackage.pkgname // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(jq -r '.releaseTag // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "package_version=$(jq -r '.packageVersion' "$json")" >> "$GITHUB_OUTPUT"
          echo "prerelease=$(jq -r '.prerelease // false' "$json")" >> "$GITHUB_OUTPUT"

      - name: Smoke channel
        if: steps.meta.outputs.skipped != 'true'
        run: |
          sudo chown root:root "${{ steps.meta.outputs.linux_dir }}/chrome-sandbox"
          sudo chmod 4755 "${{ steps.meta.outputs.linux_dir }}/chrome-sandbox"
          xvfb-run -a node scripts/smoke-artifacts.mjs \
            --channel "prod" \
            --release-json "dist/prod-release.json" \
            --json-output "dist/prod-smoke.json"

      - name: Generate release notes
        if: steps.meta.outputs.skipped != 'true'
        run: |
          node scripts/release-notes.mjs \
            --channel "prod" \
            --package-version "${{ steps.meta.outputs.package_version }}" \
            > dist/prod-release-notes.md

      - name: Upload workflow artifacts
        if: steps.meta.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prod-${{ steps.meta.outputs.package_version }}
          path: |
            ${{ steps.meta.outputs.appimage }}
            ${{ steps.meta.outputs.tarball }}
            ${{ steps.meta.outputs.icon }}
            ${{ steps.meta.outputs.checksums }}
            ${{ steps.meta.outputs.pkgbuild }}
            ${{ steps.meta.outputs.srcinfo }}
            ${{ steps.meta.outputs.install_script }}

      - name: Create or update GitHub release
        if: steps.meta.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ steps.meta.outputs.release_tag }}" >/dev/null 2>&1; then
            prerelease_flag=""
            if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
              prerelease_flag="--prerelease"
            fi
            gh release create "${{ steps.meta.outputs.release_tag }}" \
              --title "${{ steps.meta.outputs.release_tag }}" \
              $prerelease_flag \
              --notes-file dist/prod-release-notes.md
          fi

          gh release edit "${{ steps.meta.outputs.release_tag }}" \
            --notes-file dist/prod-release-notes.md

          gh release upload "${{ steps.meta.outputs.release_tag }}" \
            "${{ steps.meta.outputs.appimage }}" \
            "${{ steps.meta.outputs.tarball }}" \
            "${{ steps.meta.outputs.icon }}" \
            "${{ steps.meta.outputs.checksums }}" \
            --clobber

      - name: Build personal pacman package
        if: steps.meta.outputs.skipped != 'true'
        run: |
          mkdir -p dist/pacman-build dist/pacman-repo
          cp "${{ steps.meta.outputs.pkgbuild }}" dist/pacman-build/PKGBUILD
          cp "${{ steps.meta.outputs.install_script }}" \
            "dist/pacman-build/${{ steps.meta.outputs.aur_package_name }}.install"

          docker run --rm \
            -v "$PWD/dist/pacman-build:/build" \
            -w /build \
            archlinux:base-devel \
            bash -lc '
              useradd -m builder
              chown -R builder:builder /build
              su builder -c "makepkg --nodeps --noconfirm --cleanbuild"
            '

          cp dist/pacman-build/*.pkg.tar.zst dist/pacman-repo/

          docker run --rm \
            -v "$PWD/dist/pacman-repo:/repo" \
            -w /repo \
            archlinux:base-devel \
            bash -lc 'repo-add codex-personal.db.tar.gz *.pkg.tar.zst'

          db_target=$(readlink dist/pacman-repo/codex-personal.db)
          rm dist/pacman-repo/codex-personal.db
          cp "dist/pacman-repo/${db_target}" dist/pacman-repo/codex-personal.db

      - name: Publish personal pacman repository
        if: steps.meta.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view pacman-repo >/dev/null 2>&1; then
            gh release create pacman-repo \
              --prerelease \
              --title "Personal pacman repository" \
              --notes "Stable pacman repository for this fork."
          fi

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/pacman-repo" \
            --jq '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .id' |
            while read -r asset_id; do
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done

          gh release upload pacman-repo \
            dist/pacman-repo/codex-personal.db \
            dist/pacman-repo/*.pkg.tar.zst \
            --clobber

  publish-beta:
    needs: [preflight, canary]
    if: github.event.inputs.force == 'true' || needs.preflight.outputs.beta_outdated == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NPM_PACKAGE_NAME: "codex-app-linux"
      CODEX_RELEASE_REPO: "${{ github.repository }}"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y p7zip-full jq libarchive-tools xvfb x11-utils

      - name: Install repo deps
        run: npm ci

      - name: Install browser deps
        run: npx playwright install --with-deps chromium

      - name: Build channel
        run: |
          extra_args=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            extra_args="--force"
          fi
          node scripts/release-channel.mjs \
            --channel "beta" \
            --json-output "dist/beta-release.json" \
            $extra_args

      - name: Read build metadata
        id: meta
        run: |
          json="dist/beta-release.json"
          echo "skipped=$(jq -r '.skipped // false' "$json")" >> "$GITHUB_OUTPUT"
          echo "linux_dir=$(jq -r '.linuxDir // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "appimage=$(jq -r '.appImagePath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "tarball=$(jq -r '.unpackedTarballPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "icon=$(jq -r '.iconAssetPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "checksums=$(jq -r '.checksumsPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "pkgbuild=$(jq -r '.aurPackage.pkgbuildPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "srcinfo=$(jq -r '.aurPackage.srcinfoPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "install_script=$(jq -r '.aurPackage.installPath // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "aur_package_name=$(jq -r '.aurPackage.pkgname // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(jq -r '.releaseTag // ""' "$json")" >> "$GITHUB_OUTPUT"
          echo "package_version=$(jq -r '.packageVersion' "$json")" >> "$GITHUB_OUTPUT"
          echo "prerelease=$(jq -r '.prerelease // false' "$json")" >> "$GITHUB_OUTPUT"

      - name: Smoke channel
        if: steps.meta.outputs.skipped != 'true'
        run: |
          sudo chown root:root "${{ steps.meta.outputs.linux_dir }}/chrome-sandbox"
          sudo chmod 4755 "${{ steps.meta.outputs.linux_dir }}/chrome-sandbox"
          xvfb-run -a node scripts/smoke-artifacts.mjs \
            --channel "beta" \
            --release-json "dist/beta-release.json" \
            --json-output "dist/beta-smoke.json"

      - name: Generate release notes
        if: steps.meta.outputs.skipped != 'true'
        run: |
          node scripts/release-notes.mjs \
            --channel "beta" \
            --package-version "${{ steps.meta.outputs.package_version }}" \
            > dist/beta-release-notes.md

      - name: Upload workflow artifacts
        if: steps.meta.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ steps.meta.outputs.package_version }}
          path: |
            ${{ steps.meta.outputs.appimage }}
            ${{ steps.meta.outputs.tarball }}
            ${{ steps.meta.outputs.icon }}
            ${{ steps.meta.outputs.checksums }}
            ${{ steps.meta.outputs.pkgbuild }}
            ${{ steps.meta.outputs.srcinfo }}
            ${{ steps.meta.outputs.install_script }}

      - name: Create or update GitHub release
        if: steps.meta.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ steps.meta.outputs.release_tag }}" >/dev/null 2>&1; then
            prerelease_flag=""
            if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
              prerelease_flag="--prerelease"
            fi
            gh release create "${{ steps.meta.outputs.release_tag }}" \
              --title "${{ steps.meta.outputs.release_tag }}" \
              $prerelease_flag \
              --notes-file dist/beta-release-notes.md
          fi

          gh release edit "${{ steps.meta.outputs.release_tag }}" \
            --notes-file dist/beta-release-notes.md

          gh release upload "${{ steps.meta.outputs.release_tag }}" \
            "${{ steps.meta.outputs.appimage }}" \
            "${{ steps.meta.outputs.tarball }}" \
            "${{ steps.meta.outputs.icon }}" \
            "${{ steps.meta.outputs.checksums }}" \
            --clobber
